<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ book_title or slug }} — Mnemosyne</title>
<style>
:root {
  --ink: #171411; --muted: #6d6258; --paper: #f8f2e7; --paper-deep: #ece1cf;
  --line: #d8c8af; --red: #b9422f; --blue: #245f73; --green: #4d6f48; --gold: #c2872d;
  --white: #fffaf0; --shadow: 0 18px 50px rgba(55,38,19,.14);
  --font-body: "Songti SC","Noto Serif CJK SC",Georgia,serif;
  --font-display: "PingFang SC","Microsoft YaHei",sans-serif;
  --bg: radial-gradient(circle at 22% 12%,rgba(194,135,45,.18),transparent 28rem),linear-gradient(135deg,#fbf6ec 0%,#efe1ca 100%);
  --surface: rgba(255,250,240,.62); --surface-strong: rgba(255,250,240,.72);
  --ink-soft: #3d332b;
}
* { box-sizing: border-box; }
body { margin:0; color:var(--ink); background:var(--bg); font-family:var(--font-body); min-height:100vh; display:grid; place-items:center; }
.card { width:min(560px,calc(100% - 48px)); padding:40px; background:var(--surface-strong); border:1px solid var(--line); box-shadow:var(--shadow); border-radius:8px; text-align:center; }
h1 { margin:0 0 12px; font:900 28px/1.2 var(--font-display); color:var(--ink); }
.subtitle { color:var(--muted); font-size:15px; line-height:1.6; margin:0 0 32px; }
.actions { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
.btn { padding:12px 24px; border:0; cursor:pointer; font:800 14px/1.4 var(--font-display); border-radius:3px; }
.btn-primary { background:var(--red); color:var(--white); }
.btn-primary:hover { background:var(--ink); }
.btn-secondary { background:var(--white); color:var(--ink-soft); border:1px solid var(--line); }
.btn-secondary:hover { border-color:var(--gold); }
.back { margin-top:20px; color:var(--muted); font-size:13px; }
.back a { color:var(--blue); }
</style>
</head>
<body>
<div class="card">
  <h1>{{ book_title or slug }}</h1>
  <p class="subtitle">This book hasn't been analyzed yet. Click "Parse" to have AI extract chapters, frameworks, cases, and generate an interactive Architecture page.</p>
  <div class="actions">
    <button class="btn btn-primary" id="parseBtn">⟳ Parse with Hermes</button>
    <button class="btn btn-secondary" onclick="window.location.href='/'">← Back to Wall</button>
  </div>
  <p class="back">After parsing, you'll see:
    <br>God's-eye Architecture • Chapter detail pages • Frameworks &amp; case studies • Decision rules</p>
</div>
<script>
document.getElementById('parseBtn').onclick = function() {
  this.textContent = '⏳ Queued...';
  this.disabled = true;
  fetch('/api/parse/{{ slug }}', { method: 'POST' })
    .then(r => r.json())
    .then(d => {
      if (d.status === 'ok') {
        this.textContent = '✓ Started! Refresh in a few minutes.';
        this.style.background = 'var(--green)';
      } else {
        this.textContent = '✗ Error: ' + (d.error || 'unknown');
        this.style.background = 'var(--red)';
      }
    })
    .catch(() => {
      this.textContent = '✗ Failed. Try again.';
      this.disabled = false;
    });
};
</script>
</body>
</html>
