<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ book_title or slug }} — Mnemosyne</title>
<link rel="stylesheet" href="/static/style.css">
<style>
body {
  margin:0;
  background:radial-gradient(circle at 22% 12%,rgba(194,135,45,.18),transparent 28rem),linear-gradient(135deg,#fbf6ec 0%,#efe1ca 100%);
  min-height:100vh;
  color:#171411;
  font-family:"Songti SC","Noto Serif CJK SC",Georgia,serif;
}
.topbar {
  position:fixed;top:0;left:0;right:0;
  z-index:100;padding:12px 24px;
  background:rgba(255,250,240,.72);border-bottom:1px solid #d8c8af;
  backdrop-filter:blur(8px);
  display:flex;align-items:center;gap:12px;
}
.topbar a {
  color:#3d332b;text-decoration:none;
  font:800 14px/1.4 "PingFang SC","Microsoft YaHei",sans-serif;
}
.topbar .sep { color:#6d6258;font-size:12px; }
.page {
  width:min(900px,calc(100%-32px));
  margin:0 auto;padding:80px 0 44px;
}
.card {
  margin:24px 0;padding:28px;
  background:rgba(255,250,240,.62);
  border:1px solid #d8c8af;
  border-radius:3px;
}
h1 {
  margin:0 0 12px;
  font:900 28px/1.2 "PingFang SC","Microsoft YaHei",sans-serif;
  color:#171411;
}
.subtitle { color:#6d6258;font-size:17px;line-height:1.7; }
.actions { display:flex;gap:12px;margin-top:20px; }
.btn {
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 18px;border:none;border-radius:3px;
  font:700 13px/1.4 "PingFang SC","Microsoft YaHei",sans-serif;
  cursor:pointer;text-decoration:none;
}
.btn-primary { background:#245f73;color:#fffaf0; }
.btn-primary:hover { background:#1a4a5a; }
.btn-secondary {
  background:transparent;color:#171411;
  border:1px solid #d8c8af;
}
.btn-secondary:hover { background:rgba(216,200,175,.3); }
.info-box {
  margin:24px 0;
  padding:16px 20px;
  background:rgba(194,135,45,.12);
  border-left:4px solid #c2872d;
  font-size:15px;line-height:1.7;
  color:#3d332b;
}
</style>
</head>
<body>
<div class="topbar">
  <a href="/">&larr; Wall</a>
  <span class="sep">/</span>
  <span style="font:700 13px/1.4 'PingFang SC','Microsoft YaHei',sans-serif;color:#171411;">{{ book_title or slug }}</span>
</div>
<div class="page">
  <div class="card">
    <h1 style="margin-top:24px;">{{ book_title or slug }}</h1>
    <p class="subtitle">This book hasn't been analyzed yet.</p>

    <div class="info-box">
      <strong>📖 怎么分析这本书？</strong><br>
      在支持 skill/workflow 的 AI Agent 中输入：<br><br>
      <code style="background:#ece1cf;padding:3px 8px;border-radius:2px;font-size:14px;">分析《{{ book_title or slug }}》，用 book-analyst skill，按当前模板输出</code>
    </div>

    <div class="actions">
      <a href="/" class="btn btn-secondary">&larr; Back to Wall</a>
    </div>
  </div>
</div>
</body>
</html>
