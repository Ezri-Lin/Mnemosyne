<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chapter Page</title>
<style>
:root{--ink:#171411;--muted:#6d6258;--paper:#f8f2e7;--paper-deep:#ece1cf;--line:#d8c8af;--red:#b9422f;--blue:#245f73;--green:#4d6f48;--gold:#c2872d;--teal:#1d4d5c;--white:#fffaf0;--surface:rgba(255,250,240,.64);--surface-strong:rgba(255,250,240,.76);--font-body:"Songti SC","Noto Serif CJK SC",Georgia,serif;--font-display:"PingFang SC","Microsoft YaHei",sans-serif;--bg:radial-gradient(circle at 22% 12%,rgba(194,135,45,.18),transparent 28rem),linear-gradient(135deg,#fbf6ec 0%,#efe1ca 100%)}
*{box-sizing:border-box}body{margin:0;color:var(--ink);background:var(--bg);font-family:var(--font-body);transition:padding-right .25s}body.drawer-open{padding-right:420px}button{font:inherit;color:inherit}.page{width:min(1180px,calc(100% - 32px));margin:0 auto;padding:22px 0 38px}
.top-nav{display:flex;align-items:center;gap:8px;margin-bottom:14px}.home-link{display:inline-grid;place-items:center;width:30px;height:30px;background:var(--surface);border:1px solid var(--line);color:var(--ink);text-decoration:none;border-radius:5px}.home-link svg{width:15px;height:15px;stroke:currentColor;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round}.back-link{display:inline-block;padding:5px 12px;background:var(--surface);border:1px solid var(--line);color:var(--ink);font:700 12px/1.4 var(--font-display);text-decoration:none;border-radius:5px}
.hero{padding:20px 0}.eyebrow{margin:0 0 10px;color:var(--red);font:800 12px/1.3 var(--font-display);letter-spacing:.05em}.hero h1{margin:0;font:900 clamp(30px,5vw,56px)/1.05 var(--font-display)}.lede{max-width:820px;color:var(--ink-soft,#3d332b);font-size:17px;line-height:1.65}
.role-strip{display:grid;grid-template-columns:1.2fr repeat(3,.72fr);gap:10px;margin:0 0 16px}.role-card{border:1px solid var(--line);background:var(--surface);border-radius:10px;padding:13px 15px}.role-card.primary{border-left:4px solid var(--red);background:var(--surface-strong)}.role-card .lab{font:800 9px/1 var(--font-display);color:var(--muted);letter-spacing:.07em;text-transform:uppercase}.role-card .val{margin-top:7px;font:900 16px/1.32 var(--font-display)}.role-card p{margin:6px 0 0;color:var(--muted);font-size:12.5px;line-height:1.55}
.subtabs{display:flex;gap:4px;margin:12px 0 18px;border-bottom:1px solid var(--line);flex-wrap:wrap}.subtab{padding:8px 14px;border:1px solid var(--line);background:var(--surface);cursor:pointer;font:800 13px/1.3 var(--font-display);border-bottom:0}.subtab[aria-selected=true]{background:var(--ink);color:var(--white);border-color:var(--ink)}.panel{display:none}.panel.active{display:block}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.card{position:relative;border:1px solid var(--line);border-top:3px solid var(--blue);background:var(--surface);border-radius:10px;padding:15px 16px}.card h3{margin:0 0 8px;font:900 16px/1.25 var(--font-display)}.card p{margin:0;color:var(--muted);font-size:13px;line-height:1.58}.src{position:absolute;top:8px;right:8px;border:1px solid var(--line);background:var(--white);font:700 10px/1 var(--font-display);padding:3px 6px;cursor:pointer;border-radius:3px}
.empty{padding:24px;text-align:center;color:var(--muted);border:1px solid var(--line);background:var(--surface);font:14px/1.7 var(--font-display)}.drawer{position:fixed;top:0;right:0;bottom:0;width:420px;max-width:90vw;background:var(--paper);border-left:1px solid var(--line);box-shadow:-16px 0 40px rgba(55,38,19,.18);transform:translateX(100%);transition:transform .25s;z-index:90;display:flex;flex-direction:column}.drawer.open{transform:translateX(0)}.drawer-head{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:12px;background:var(--surface-strong)}.drawer-head h2{margin:0;font:900 15px/1.25 var(--font-display)}.drawer-head p{margin:4px 0 0;color:var(--muted);font:11px/1.4 var(--font-display)}.drawer-close{border:1px solid var(--line);background:var(--white);width:28px;height:28px;cursor:pointer}.drawer-body{padding:16px 18px;overflow:auto;font-size:14px;line-height:1.65;color:var(--ink-soft,#3d332b)}.source-box{border:1px solid var(--line);background:var(--surface);border-radius:9px;padding:11px 12px}.source-box blockquote{margin:10px 0;border-left:3px solid var(--blue);background:var(--white);padding:9px 11px}
@media(max-width:880px){body.drawer-open{padding-right:0}.role-strip,.grid{grid-template-columns:1fr}.drawer{width:100%}}
</style>
</head>
<body>
<main class="page">
  <nav class="top-nav" aria-label="Chapter navigation">
    <a class="home-link" href="{{LIBRARY_HREF}}" aria-label="Back to Library"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 11.5 12 4l9 7.5"></path><path d="M5.5 10.5V20h13v-9.5"></path><path d="M9.5 20v-6h5v6"></path></svg></a>
    <a class="back-link" href="{{BOOK_HOME_HREF}}">Back to Book Home</a>
  </nav>
  <section class="hero">
    <p class="eyebrow" id="chapterMeta">CHAPTER</p>
    <h1 id="chapterTitle">Untitled Chapter</h1>
    <p class="lede" id="chapterLine">Generate analysis/chapters/chXX.json to fill this page.</p>
  </section>
  <section class="role-strip" id="roleStrip"></section>
  <nav class="subtabs" aria-label="Chapter views">
    <button class="subtab" data-tab="overview" aria-selected="true">Overview</button>
    <button class="subtab" data-tab="chain" aria-selected="false">Argument Chain</button>
    <button class="subtab" data-tab="frameworks" aria-selected="false">Frameworks</button>
    <button class="subtab" data-tab="cases" aria-selected="false">Cases</button>
    <button class="subtab" data-tab="research" aria-selected="false">Research + Rules</button>
  </nav>
  <section class="panel active" id="overview"><div class="grid" id="overviewGrid"></div></section>
  <section class="panel" id="chain"><div class="grid" id="chainGrid"></div></section>
  <section class="panel" id="frameworks"><div class="grid" id="frameworkGrid"></div></section>
  <section class="panel" id="cases"><div class="grid" id="caseGrid"></div></section>
  <section class="panel" id="research"><div class="grid" id="researchGrid"></div><div class="grid" id="ruleGrid" style="margin-top:12px"></div></section>
</main>

<aside class="drawer" id="drawer">
  <div class="drawer-head"><div><h2 id="drawerTitle">Evidence</h2><p id="drawerMeta">Source trace</p></div><button class="drawer-close" onclick="closeDrawer()">x</button></div>
  <div class="drawer-body" id="drawerBody">Click a source chip to inspect evidence.</div>
</aside>

<script type="application/json" id="chapter-data">{{CHAPTER_JSON}}</script>
<script type="application/json" id="evidence-data">{{EVIDENCE_JSON}}</script>
<script>
function readJson(id,fallback){var el=document.getElementById(id);if(!el)return fallback;var raw=el.textContent.trim();if(!raw||raw.indexOf("{{")>=0)return fallback;try{return JSON.parse(raw);}catch(e){return fallback;}}
function escapeHtml(v){return String(v||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function bindSourceButtons(){document.querySelectorAll(".src[data-ref]").forEach(function(btn){btn.onclick=function(){openDrawer(btn.getAttribute("data-ref"));};});}
var chapter=readJson("chapter-data",{}), evidenceData=readJson("evidence-data",{evidence:[]});
var evidenceById={};(evidenceData.evidence||[]).forEach(function(e){evidenceById[e.id]=e;});
document.getElementById("chapterMeta").textContent="CHAPTER "+(chapter.chapterNumber||"");
document.getElementById("chapterTitle").textContent=chapter.readerTitle||chapter.originalTitle||"Untitled Chapter";
document.getElementById("chapterLine").textContent=chapter.oneLine||"Generate analysis/chapters/chXX.json to fill this page.";
function renderRole(){var list=chapter.roleCards||[];var box=document.getElementById("roleStrip");if(!list.length){box.innerHTML='<div class="empty">No chapter role cards yet.</div>';return;}box.innerHTML=list.map(function(c,i){return '<article class="role-card '+(i===0?'primary':'')+'"><div class="lab">'+escapeHtml(c.label)+'</div><div class="val">'+escapeHtml(c.value)+'</div><p>'+escapeHtml(c.body)+'</p></article>';}).join("");}
function firstRef(item){return item.sourceRef || ((item.evidenceRefs||[])[0]) || "";}
function renderCards(id,list){var box=document.getElementById(id);if(!list||!list.length){box.innerHTML='<div class="empty">No data for this module yet.</div>';return;}box.innerHTML=list.map(function(c){var ref=firstRef(c);return '<article class="card"><button class="src" data-ref="'+escapeHtml(ref)+'">src</button><h3>'+escapeHtml(c.title||c.claim||c.name||c.question||"Untitled")+'</h3><p>'+escapeHtml(c.body||c.logic||c.summary||c.reasoning||c.use||"")+'</p></article>';}).join("");bindSourceButtons();}
function openDrawer(id){var e=evidenceById[id];if(!e){return;}document.getElementById("drawerTitle").textContent=e.title||id;document.getElementById("drawerMeta").textContent=(e.type||"evidence")+" · "+(e.sourceRange||"");document.getElementById("drawerBody").innerHTML='<div class="source-box">'+(e.shortQuote||e.sourceHint?'<blockquote>'+escapeHtml(e.shortQuote||e.sourceHint)+'</blockquote>':'')+'<p><strong>Summary:</strong> '+escapeHtml(e.summary)+'</p><p><strong>Why:</strong> '+escapeHtml(e.whyImportant)+'</p><p><strong>AI:</strong> '+escapeHtml(e.aiUnderstanding)+'</p><p><strong>Read:</strong> '+escapeHtml(e.readLocation)+'</p></div>';document.getElementById("drawer").classList.add("open");document.body.classList.add("drawer-open");}
function closeDrawer(){document.getElementById("drawer").classList.remove("open");document.body.classList.remove("drawer-open");}
document.querySelectorAll(".subtab").forEach(function(btn){btn.onclick=function(){document.querySelectorAll(".subtab").forEach(function(b){b.setAttribute("aria-selected","false");});document.querySelectorAll(".panel").forEach(function(p){p.classList.remove("active");});btn.setAttribute("aria-selected","true");document.getElementById(btn.getAttribute("data-tab")).classList.add("active");};});
renderRole();renderCards("overviewGrid",chapter.overviewCards);renderCards("chainGrid",chapter.argumentChain);renderCards("frameworkGrid",chapter.frameworks);renderCards("caseGrid",chapter.cases);renderCards("researchGrid",chapter.research);renderCards("ruleGrid",chapter.decisionRules);
</script>
</body>
</html>
