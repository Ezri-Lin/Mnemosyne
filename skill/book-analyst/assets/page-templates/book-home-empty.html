<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Book Home</title>
<style>
:root{--ink:#171411;--muted:#6d6258;--paper:#f8f2e7;--paper-deep:#ece1cf;--line:#d8c8af;--red:#b9422f;--blue:#245f73;--green:#4d6f48;--gold:#c2872d;--white:#fffaf0;--surface:rgba(255,250,240,.64);--surface-strong:rgba(255,250,240,.76);--font-body:"Songti SC","Noto Serif CJK SC",Georgia,serif;--font-display:"PingFang SC","Microsoft YaHei",sans-serif;--bg:radial-gradient(circle at 22% 12%,rgba(194,135,45,.18),transparent 28rem),linear-gradient(135deg,#fbf6ec 0%,#efe1ca 100%)}
*{box-sizing:border-box}body{margin:0;color:var(--ink);background:var(--bg);font-family:var(--font-body)}button{font:inherit;color:inherit}.page{width:min(1220px,calc(100% - 32px));margin:0 auto;padding:22px 0 40px}
.top{display:flex;align-items:center;gap:8px;margin-bottom:14px}.home{display:inline-grid;place-items:center;width:30px;height:30px;border:1px solid var(--line);background:var(--surface);border-radius:5px}.home svg{width:15px;height:15px;stroke:currentColor;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.hero{display:grid;grid-template-columns:1fr 320px;gap:24px;align-items:end;margin-bottom:18px}.eyebrow{color:var(--red);font:800 12px/1.2 var(--font-display);letter-spacing:.05em}.hero h1{margin:8px 0;font:900 clamp(34px,6vw,68px)/1 var(--font-display)}.lede{color:var(--ink-soft,#3d332b);font-size:18px;line-height:1.65}.thesis{border-left:6px solid var(--red);background:var(--surface-strong);padding:18px;box-shadow:0 14px 38px rgba(55,38,19,.12)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:14px 0}.stat{border:1px solid var(--line);background:var(--surface);padding:11px}.stat strong{display:block;font:900 20px/1 var(--font-display);color:var(--blue)}.stat span{font:11px/1.4 var(--font-display);color:var(--muted)}
.shell{display:grid;grid-template-columns:300px 1fr 300px;gap:14px}.panel{border:1px solid var(--line);background:var(--surface);padding:15px}.panel h2{margin:0 0 10px;font:900 18px/1.2 var(--font-display)}.theme{width:100%;text-align:left;border:1px solid var(--line);background:var(--white);padding:10px;margin-bottom:8px;border-radius:7px;cursor:pointer}.theme.active{border-color:var(--red);box-shadow:inset 4px 0 0 var(--red)}.theme strong{display:block;font:900 14px/1.2 var(--font-display)}.theme span{display:block;color:var(--muted);font-size:12px;line-height:1.5;margin-top:4px}
.heatmap{display:grid;grid-template-columns:repeat(auto-fill,minmax(54px,1fr));gap:5px}.cell{border:1px solid var(--line);background:var(--paper-deep);padding:7px 5px;min-height:50px;font:800 12px/1.2 var(--font-display);text-align:center}.cell.must-read{background:var(--red);color:var(--white);border-color:var(--red)}.cell.useful{background:var(--gold);color:var(--white);border-color:var(--gold)}
.detail-card{border:1px dashed var(--line);background:var(--white);padding:12px;margin-bottom:9px}.detail-card h3{margin:0 0 6px;font:900 15px/1.25 var(--font-display)}.detail-card p{margin:0;color:var(--muted);font-size:13px;line-height:1.55}.empty{padding:24px;text-align:center;color:var(--muted);font:14px/1.7 var(--font-display)}
@media(max-width:980px){.hero,.shell{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<main class="page">
  <nav class="top" aria-label="Book navigation">
    <a class="home" href="{{LIBRARY_HREF}}" aria-label="Back to Library"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 11.5 12 4l9 7.5"></path><path d="M5.5 10.5V20h13v-9.5"></path><path d="M9.5 20v-6h5v6"></path></svg></a>
  </nav>
  <section class="hero">
    <div>
      <div class="eyebrow">BOOK HOME</div>
      <h1 id="title">Untitled Book</h1>
      <p class="lede" id="coreQuestion">No book analysis has been injected yet.</p>
    </div>
    <aside class="thesis"><strong>Thesis</strong><p id="thesis">Generate analysis/book.json to fill this page.</p></aside>
  </section>
  <section class="stats" id="stats"></section>
  <section class="shell">
    <aside class="panel"><h2>Themes</h2><div id="themes"></div></aside>
    <section class="panel"><h2>Chapter Heatmap</h2><div class="heatmap" id="chapters"></div></section>
    <aside class="panel"><h2 id="themeTitle">Theme Evidence</h2><div id="themeDetail" class="empty">Select a theme after themes are generated.</div></aside>
  </section>
</main>

<script type="application/json" id="book-data">{{BOOK_JSON}}</script>
<script type="application/json" id="themes-data">{{THEMES_JSON}}</script>
<script type="application/json" id="chapters-data">{{CHAPTERS_JSON}}</script>
<script type="application/json" id="evidence-data">{{EVIDENCE_JSON}}</script>
<script>
function readJson(id,fallback){var el=document.getElementById(id);if(!el)return fallback;var raw=el.textContent.trim();if(!raw||raw.indexOf("{{")>=0)return fallback;try{return JSON.parse(raw);}catch(e){return fallback;}}
function escapeHtml(v){return String(v||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
var book=readJson("book-data",{}), themeData=readJson("themes-data",{themes:[]}), chapterData=readJson("chapters-data",{chapters:[]}), evidenceData=readJson("evidence-data",{evidence:[]});
document.getElementById("title").textContent=book.title||"Untitled Book";
document.getElementById("coreQuestion").textContent=book.coreQuestion||"No book analysis has been injected yet.";
document.getElementById("thesis").textContent=book.thesis||"Generate analysis/book.json to fill this page.";
var s=book.stats||{};document.getElementById("stats").innerHTML=[["Chapters",s.chapterCount||0],["Must Read",s.mustReadCount||0],["Themes",s.themeCount||0],["Evidence",s.evidenceCount||0]].map(function(x){return '<div class="stat"><strong>'+x[1]+'</strong><span>'+x[0]+'</span></div>';}).join("");
function renderThemes(){var box=document.getElementById("themes");if(!themeData.themes.length){box.innerHTML='<div class="empty">No themes yet.</div>';return;}box.innerHTML=themeData.themes.map(function(t,i){return '<button class="theme '+(i===0?'active':'')+'" data-id="'+escapeHtml(t.id)+'"><strong>'+escapeHtml(t.title)+'</strong><span>'+escapeHtml(t.oneLine)+'</span></button>';}).join("");document.querySelectorAll(".theme").forEach(function(btn){btn.onclick=function(){document.querySelectorAll(".theme").forEach(function(b){b.classList.remove("active");});btn.classList.add("active");selectTheme(btn.getAttribute("data-id"));};});selectTheme(themeData.themes[0].id);}
function selectTheme(id){var t=themeData.themes.filter(function(x){return x.id===id;})[0];if(!t)return;document.getElementById("themeTitle").textContent=t.title;document.getElementById("themeDetail").innerHTML='<div class="detail-card"><h3>Why read</h3><p>'+escapeHtml(t.whyRead)+'</p></div><div class="detail-card"><h3>Reading order</h3><p>'+escapeHtml((t.readingOrder||[]).join(" -> "))+'</p></div><div class="detail-card"><h3>What you get</h3><p>'+escapeHtml(t.whatYouGet)+'</p></div>';}
function renderChapters(){var box=document.getElementById("chapters");if(!chapterData.chapters.length){box.innerHTML='<div class="empty">No chapters yet.</div>';return;}box.innerHTML=chapterData.chapters.map(function(c){var cls=c.recommendation==="must-read"?"must-read":(c.recommendation==="useful"?"useful":"");var label="Ch "+(c.number||"");return '<a class="cell '+cls+'" href="'+escapeHtml(c.detailPage||"#")+'" title="'+escapeHtml(c.readerTitle||c.originalTitle||"")+'">'+escapeHtml(label)+'</a>';}).join("");}
renderThemes();renderChapters();
</script>
</body>
</html>
