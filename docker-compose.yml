version: '3.8'

services:
  mnemosyne:
    build: .
    container_name: mnemosyne
    ports:
      - "5052:5000"
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:///app/data/mnemosyne.db
      - MNEMO_LANG=en
      - MNEMO_PORT=5000
      - VAULT_DIR=/app/data/vault-sync
    restart: unless-stopped
