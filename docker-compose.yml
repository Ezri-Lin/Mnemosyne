version: "3.8"

services:
  mnemosyne:
    build: .
    container_name: mnemosyne
    ports:
      - "5000:5000"
    environment:
      - VAULT_DIR=/vault
      - FLASK_ENV=production
    volumes:
      - ./data:/app/data
      - ${VAULT_DIR}:/vault:ro  # mount vault read-only
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
