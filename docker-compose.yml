services:
  mnemosyne:
    build: .
    container_name: mnemosyne
    ports:
      - "${MNEMO_PORT_EXTERNAL:-5052}:5000"
    volumes:
      - ./data:/app/data
      - ${VAULT_DIR:-/home/lighthouse/Golden-House}:/app/vault
    environment:
      - DATABASE_URL=sqlite:////app/data/mnemosyne.db
      - MNEMO_LANG=zh
      - MNEMO_PORT=5000
      - VAULT_DIR=/app/vault
    restart: unless-stopped
