services:
  mnemosyne:
    build: .
    container_name: mnemosyne
    ports:
      - "5052:5000"
    volumes:
      - ./data:/app/data
      - /home/lighthouse/Golden-House:/app/vault
    environment:
      - DATABASE_URL=sqlite:////app/data/mnemosyne.db
      - MNEMO_LANG=zh
      - MNEMO_PORT=5000
      - VAULT_DIR=/app/vault
    restart: unless-stopped
